<div class="ad-only-click-block" style="width:100%; display:flex; justify-content:center;">
  <style>
    .ad-only-click-block {
      pointer-events: auto;
    }
  </style>
  <script>
  (function () {
    const originalOpen = window.open;
    let lastUserClick = 0;
  
    document.addEventListener("click", () => {
      lastUserClick = Date.now();
    }, true);
  
    window.open = function (url, target, features) {
      const now = Date.now();
  
      // Solo permitir si hubo clic reciente (1 segundo)
      if (now - lastUserClick < 1000) {
        return originalOpen.call(window, url, target, features);
      }
  
      console.log("Popup bloqueado:", url);
      return null;
    };
  
    // Bloquear redirecciones forzadas
    const originalAssign = window.location.assign;
    window.location.assign = function(url) {
      const now = Date.now();
      if (now - lastUserClick < 1000) {
        return originalAssign.call(window.location, url);
      }
      console.log("Redirect bloqueado:", url);
    };
  
    const originalReplace = window.location.replace;
    window.location.replace = function(url) {
      const now = Date.now();
      if (now - lastUserClick < 1000) {
        return originalReplace.call(window.location, url);
      }
      console.log("Redirect bloqueado:", url);
    };
  
  })();
  </script>
