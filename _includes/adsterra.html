<div class="ad-only-click-block">
  <style>
    .ad-only-click-block {
      pointer-events: auto !important;
    }
  </style>

  <script>
    (function () {
      const originalOpen = window.open;
      let userGestureUntil = 0;
      const ALLOW_WINDOW_MS = 1200;

      function markUserGesture() {
        userGestureUntil = Date.now() + ALLOW_WINDOW_MS;
      }

      const block = document.currentScript?.parentElement;
      if (block) {
        ['click', 'auxclick', 'pointerdown', 'touchstart', 'keydown'].forEach((event) => {
          block.addEventListener(event, markUserGesture, true);
        });
      }

      window.open = function (url, target, features) {
        const hasUserGesture =
          (window.navigator.userActivation && window.navigator.userActivation.isActive) ||
          Date.now() <= userGestureUntil;

        if (hasUserGesture) {
          return originalOpen.call(window, url, target, features);
        }

        return null;
      };
    })();
  </script>
