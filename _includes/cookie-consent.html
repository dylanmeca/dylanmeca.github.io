<style>
  #cookie-notice {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    background-color: var(--color-bg, #1a1a2e);
    color: var(--color-fg);
    padding: 0.75rem 1rem;
    text-align: center;
    box-shadow: 0 -6px 18px rgba(0, 0, 0, 0.18);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  #cookie-notice .cookie-wrap {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  #cookie-notice .cookie-text {
    font-size: 0.95rem;
    line-height: 1.45;
    margin: 0;
  }

  #cookie-notice .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 2.25rem;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    white-space: nowrap;
  }

  #cookie-notice .btn:hover {
    transform: translateY(-1px);
    opacity: 0.95;
  }

  #cookie-notice .btn:focus {
    outline: 2px solid currentColor;
    outline-offset: 2px;
  }

  #cookie-notice .btn-primary {
    background: var(--color-primary, #2563eb);
    color: #fff;
  }

  #cookie-notice .btn-secondary {
    background: transparent;
    color: var(--color-fg);
    border-color: rgba(255, 255, 255, 0.25);
  }

  @media (max-width: 640px) {
    #cookie-notice {
      padding: 0.9rem 0.8rem;
    }

    #cookie-notice .cookie-wrap {
      gap: 0.6rem;
    }

    #cookie-notice .cookie-text {
      width: 100%;
      text-align: center;
      font-size: 0.92rem;
    }

    #cookie-notice .btn {
      flex: 1 1 100%;
      max-width: 320px;
    }
  }
</style>

<div id="cookie-notice" role="dialog" aria-live="polite" aria-label="Aviso de cookies">
  <div class="cookie-wrap">
    <span class="cookie-text">Usamos cookies para mejorar la experiencia de los usuarios en este blog.</span>

    <a id="cookie-notice-accept" class="btn btn-primary btn-sm" href="#">Aceptar</a>

    <a href="{{ 'politica-de-privacidad' | relative_url }}" class="btn btn-secondary btn-sm">
      Más información
    </a>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var notice = document.getElementById('cookie-notice');
    var acceptBtn = document.getElementById('cookie-notice-accept');

    if (localStorage.getItem('cookieAccepted') === 'true') {
      notice.style.display = 'none';
    } else {
      notice.style.display = 'block';
    }

    acceptBtn.addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.setItem('cookieAccepted', 'true');
      notice.style.display = 'none';
    });
  });
</script>
